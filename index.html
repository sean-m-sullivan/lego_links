<!DOCTYPE html>

<!-- 
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
        
    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Sean's Lego Tree of Links</title>
    <link rel="icon" type="image/x-icon" href="/images/Headshot.png"> <!-- Update this with your own favicon -->
    
    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Link to Lego and other businesses.">
    
    <!-- Keywords -->
    <meta name="keywords" content="Sean Sullivan Lego Moc builder">
    
    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://yourwebsite.com">
    
    <!-- Author Information -->
    <meta name="author" content="Sean Sullivan">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
  
    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended. 
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!-- 
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--rounded" src="images/Headshot.png" srcset="images/Headshot@2x.png 2x" alt="Me">

            <!-- Replace with your name or brand -->
            <h1>
              <div>LittleLink</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>Links to where I am on the internet.</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- Rebrickable Mocs -->
              <a class="button button-default" href="https://rebrickable.com/users/Alphonse42/mocs/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/rebrickable.png" alt="Rebrickable Mocs">Rebrickable Mocs</a>

              <!-- Flickr -->
              <a class="button button-amazon" href="https://www.flickr.com/photos/200408953@N03/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/flickr.svg" alt="Flickr">Flickr</a>

              <!-- Bricklink Store -->
              <a class="button button-amazon-music" href="https://store.bricklink.com/alphonse#/shop" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/bl_logo-horizontal.svg" alt="Bricklink">Bricklink Store</a>  
              
              <!-- Etsy -->
              <a class="button button-appstore" href="https://www.etsy.com/shop/Vaultcrest" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/etsy.svg" alt="Etsy">Etsy</a>
             
              <!-- GitHub -->
              <a class="button button-github" href="https://github.com/sean-m-sullivan/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/github.svg" alt="GitHub Logo">Check out my Professional Profile where I wrote a book!</a>

      </div>
        
      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <a href="privacy.html">Privacy Policy</a> | Build your own by forking <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
      </footer>
    
    </div>
  </div>

</body>

</html>
